    kind: yield
  - name: UST 30Y
    ticker: ^TYX
    kind: yield
llm:
  enabled: true
  model: gpt-4o-mini
  max_output_tokens: 7000
  temperature: 0.0
  style:
    tone: sell-side quant morning note
    bullets_max: 7
    avoid_quotes: true
    speculation_label: 추정
  guardrails:
    require_sources: true
    forbid_verbatim_title_copy: true
  narrative:
    model: gpt-4o-mini
    temperature: 0.2
    max_output_tokens: 1400
    kr_k: 10
    gl_k: 10
  story_model: gpt-5-mini
  story_temperature: 0.15
  story_max_output_tokens: 3200
render:
  markdown: true
  excel: true
  story: true
nlp:
  market_filter:
    enabled: true
    mode: balanced
    keep_min_score: 2.8
    keep_sources: []
  echo:
    enabled: true
    weight: 0.35
    source_weight: 0.15
  semantic_cluster:
    enabled: true
    embedding_model: text-embedding-3-small
    distance_threshold: 0.18
    min_text_chars: 30
    text_max_chars: 1200
  cluster_tagging:
    enabled: true
    top_k_titles: 10
    model: gpt-4o-mini
    temperature: 0.1
    max_output_tokens: 800    
story:
  kr_items: 30
  global_items: 26
  max_themes: 7
  sector_move_threshold: 0.8
  use_sectors: true
  mode_auto: true
  kst_open_hhmm: 09:00
  kst_close_hhmm: '15:30'
  fetch_excerpts: true
  excerpt_top_k: 10
  excerpt_max_chars: 900
  min_paragraph: 10
  min_chars: 4500