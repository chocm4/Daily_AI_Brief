    penalty: 2.0
  - pattern: \b(net profit|revenue|eps|earnings|quarter|q[1-4])\b
    penalty: 1.8
  - pattern: \b(stock gains|shares rise|shares fall)\b
    penalty: 1.2
  - pattern: \b(approval of application|enforcement action)\b
