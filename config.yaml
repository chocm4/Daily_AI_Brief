market:
  enabled: true
  source: yfinance
  history_days: 90
  intraday_interval: "5m"

  sectors_krx:
    enabled: true
    market: "KOSPI"
    lookback_days: 14
    top_k: 4
    bottom_k: 4

  flows_krx:
    enabled: true
    window:
      start_hhmm: "1830"
      end_hhmm: "0900"
    tops:
      top_k: 5
      investors: ["외국인", "기관합계", "개인"]
      include_price: true

  assets:
    - {name: "KOSPI", ticker: "^KS11"}
    - {name: "KOSDAQ", ticker: "^KQ11"}

    # US
    - {name: "Dow Jones", ticker: "^DJI"}
    - {name: "S&P500", ticker: "^GSPC"}
    - {name: "NASDAQ", ticker: "^IXIC"}
    - {name: "Russell 2000", ticker: "^RUT"}
    - {name: "SOX", ticker: "^SOX"}

    # Asia / Europe
    - {name: "Nikkei 225", ticker: "^N225"}
    - {name: "Taiwan Weighted", ticker: "^TWII"}
    - {name: "Hang Seng", ticker: "^HSI"}
    - {name: "CSI300", ticker: "000300.SS"}
    - {name: "Shanghai Composite", ticker: "000001.SS"}
    - {name: "Euro Stoxx 50", ticker: "^STOXX50E"}
    - {name: "STOXX Europe 600", ticker: "^STOXX"}

    # Global equity ETF proxy
    - {name: "MSCI ACWI", ticker: "ACWI"}
    - {name: "MSCI DM", ticker: "URTH"}
    - {name: "MSCI EM", ticker: "EEM"}

    # FX / commodity / vol
    - {name: "USDKRW", ticker: "KRW=X"}
    - {name: "DXY", ticker: "DX-Y.NYB"}
    - {name: "Euro Currency Index", ticker: "^XDE"}   # narrative에서 EXY로 표시
    - {name: "WTI", ticker: "CL=F"}
    - {name: "Gold", ticker: "GC=F"}
    - {name: "VIX", ticker: "^VIX"}
    - {name: "MOVE", ticker: "^MOVE"}

    # Rates
    - {name: "UST 3M", ticker: "^IRX", kind: "yield"}
    - {name: "UST 5Y", ticker: "^FVX", kind: "yield"}
    - {name: "UST 10Y", ticker: "^TNX", kind: "yield"}
    - {name: "UST 30Y", ticker: "^TYX", kind: "yield"}

    # VKOSPI는 현재 yfinance에서 안정적으로 검증된 표준 티커를 확정하지 못해 기본 패치에서는 제외.
    # 유효 티커를 확보하면 아래 1줄만 추가하면 narrative / market_context는 자동 반영됨.
    # - {name: "VKOSPI", ticker: "<VALID_TICKER>"}
llm:
  enabled: true
  model: gpt-5-mini
  max_output_tokens: 12000
  temperature: 0.0
  # gpt-5 계열 reasoning effort (minimal|low|medium|high). 깊은 분석용으로 high.
  # 추론 토큰이 max_output_tokens 예산을 함께 소비하므로 위 값을 넉넉히 둔다.
  reasoning_effort: high
  style:
    tone: sell-side quant morning note
    bullets_max: 7
    avoid_quotes: true
    speculation_label: 추정
  guardrails:
    require_sources: true
    forbid_verbatim_title_copy: true
  story_model: gpt-5-mini
  story_fallback_model: gpt-5-mini
  story_editor_model: gpt-5-mini
  story_temperature: 0.15
  story_editor_temperature: 0.1
  # story도 reasoning effort를 별도로 지정. 추론 토큰 여유분 포함해 토큰 상향.
  story_reasoning_effort: high
  story_max_output_tokens: 7000
  story_editor_max_output_tokens: 3200
  show_sources_in_story: false
  show_reference_articles: true
render:
  markdown: true
  excel: false
  story: true
nlp:
  market_filter:
    enabled: true
    mode: balanced
    keep_min_score: 2.8
    keep_sources: []
  semantic_cluster:
    enabled: true
    embedding_model: text-embedding-3-small
    distance_threshold: 0.18
    min_text_chars: 30
    text_max_chars: 1200
    batch_size: 64
  cluster_tagging:
    enabled: true
    top_k_titles: 10
    model: gpt-5-mini
    temperature: 0.1
    max_output_tokens: 800
story:
  kr_items: 30
  global_items: 26
  brief_kr_items: 12
  brief_gl_items: 12
  max_themes: 7
  news_desc_chars: 360
  sector_topk: 3
  mover_topk: 5
  kst_open_hhmm: 09:00
  kst_close_hhmm: '15:30'
  us_tz: America/New_York
  us_open_hhmm: 09:30
  us_close_hhmm: '16:00'
  target_chars: 4500
  telegram_body_reserve_chars: 120
  min_paragraphs: 5
  max_paragraphs: 8
  sentences_per_paragraph: 2-4
  enable_editor_pass: true
  enable_expander_pass: true
telegram:
  enabled: true
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
  fail_on_error: true
  send_message: true
  message_file_priority:
  - report_story.md
  - report.md
  prepend_title: true
  title_template: AI Daily Briefing | {asof} | {run_mode}
  max_message_length: 3500
  disable_web_page_preview: true
  single_message_only: true
  truncate_suffix: '


    ...(truncated)'
  send_story_file: false
  send_markdown_file: false
  send_excel_file: false
  send_fact_pack_file: false
