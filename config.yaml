market:
  sectors_krx:
    enabled: true
    market: KOSPI         # KOSPI 또는 KOSDAQ
    lookback_days: 14
    top_k: 4
    bottom_k: 4
  flows_krx:
    enabled: true
    window:
      start_hhmm: "1830"   # 18:05부터 허용 (18:00 이후 안정화 고려)
      end_hhmm: "0900"     # 09:00 이전까지 허용
    tops:
      top_k: 5
      investors: ["외국인", "기관합계", "개인"]
      include_price: true
  enabled: true
  source: yfinance
  history_days: 90
  assets:
  - name: KOSPI
    ticker: ^KS11
  - name: KOSDAQ
    ticker: ^KQ11
  - name: Dow Jones
    ticker: ^DJI
  - name: S&P500
    ticker: ^GSPC
  - name: NASDAQ
    ticker: ^IXIC
